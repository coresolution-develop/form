# form.sosyge.net 의 TLS VirtualHost(<VirtualHost *:443>) 블록 안에 추가한다.
# 필요한 모듈: mod_proxy, mod_proxy_http
#   (확인: httpd -M | grep proxy   /   없으면 LoadModule 추가)

ProxyPreserveHost On

# /ex (슬래시 없음) → /ex/ 로 정규화
RedirectMatch ^/ex$ /ex/

# /ex/ 이하를 ex NestJS(:9100) 로 전달.
# 끝의 슬래시 때문에 경로의 "/ex/" 는 제거되어 전달됨 (/ex/products → :9100/products).
ProxyPass        /ex/ http://127.0.0.1:9100/
ProxyPassReverse /ex/ http://127.0.0.1:9100/
