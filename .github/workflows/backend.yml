name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 빌드·테스트는 GitHub 호스티드 러너에서 (서버 부하 없음)
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: formflow_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Test
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test
      - name: Build bootJar
        working-directory: backend
        run: ./gradlew bootJar
      - name: Stage bundle
        working-directory: backend
        run: |
          mkdir -p build/bundle
          cp "$(find build/libs -maxdepth 1 -name '*.jar' ! -name '*-plain.jar' | head -n1)" build/bundle/app.jar
          cp deploy/deploy.sh build/bundle/deploy.sh
      - uses: actions/upload-artifact@v4
        with:
          name: backend-bundle
          path: backend/build/bundle/
          retention-days: 1

  # 배포는 서버에 설치된 self-hosted 러너에서 (SSH/방화벽 불필요)
  deploy:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-bundle
          path: bundle
      - name: Resolve deploy target
        id: tgt
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "service=formflow"        >> "$GITHUB_OUTPUT"
            echo "app_dir=/opt/formflow"   >> "$GITHUB_OUTPUT"
            echo "staging=/tmp/formflow"   >> "$GITHUB_OUTPUT"
            echo "health=http://localhost:9000/actuator/health" >> "$GITHUB_OUTPUT"
          else
            echo "service=formflow-dev"        >> "$GITHUB_OUTPUT"
            echo "app_dir=/opt/formflow-dev"   >> "$GITHUB_OUTPUT"
            echo "staging=/tmp/formflow-dev"   >> "$GITHUB_OUTPUT"
            echo "health=http://localhost:9001/actuator/health" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy
        run: |
          mkdir -p "${{ steps.tgt.outputs.staging }}"
          cp bundle/app.jar bundle/deploy.sh "${{ steps.tgt.outputs.staging }}/"
          chmod +x "${{ steps.tgt.outputs.staging }}/deploy.sh"
          SERVICE=${{ steps.tgt.outputs.service }} \
          APP_DIR=${{ steps.tgt.outputs.app_dir }} \
          STAGING_DIR=${{ steps.tgt.outputs.staging }} \
          HEALTH_URL=${{ steps.tgt.outputs.health }} \
          bash "${{ steps.tgt.outputs.staging }}/deploy.sh"
