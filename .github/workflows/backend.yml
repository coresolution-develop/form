name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: formflow_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Test
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test

  deploy:
    needs: test
    # main → prod, develop → dev (push 한정)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build bootJar
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew bootJar

      - name: Resolve deploy target
        id: tgt
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "service=formflow"        >> "$GITHUB_OUTPUT"
            echo "app_dir=/opt/formflow"   >> "$GITHUB_OUTPUT"
            echo "staging=/tmp/formflow"   >> "$GITHUB_OUTPUT"
            echo "health=http://localhost:9000/actuator/health" >> "$GITHUB_OUTPUT"
          else
            echo "service=formflow-dev"        >> "$GITHUB_OUTPUT"
            echo "app_dir=/opt/formflow-dev"   >> "$GITHUB_OUTPUT"
            echo "staging=/tmp/formflow-dev"   >> "$GITHUB_OUTPUT"
            echo "health=http://localhost:9001/actuator/health" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage bundle
        working-directory: backend
        run: |
          mkdir -p build/bundle
          cp "$(find build/libs -maxdepth 1 -name '*.jar' ! -name '*-plain.jar' | head -n1)" build/bundle/app.jar
          cp deploy/deploy.sh build/bundle/deploy.sh

      - name: Copy bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: 'backend/build/bundle/*'
          target: ${{ steps.tgt.outputs.staging }}
          strip_components: 3

      - name: Run remote deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            chmod +x ${{ steps.tgt.outputs.staging }}/deploy.sh
            SERVICE=${{ steps.tgt.outputs.service }} \
            APP_DIR=${{ steps.tgt.outputs.app_dir }} \
            STAGING_DIR=${{ steps.tgt.outputs.staging }} \
            HEALTH_URL=${{ steps.tgt.outputs.health }} \
            bash ${{ steps.tgt.outputs.staging }}/deploy.sh
