# form.sosyge.net 의 TLS VirtualHost(<VirtualHost *:443>) 블록 안에 추가한다.
# 필요한 모듈: mod_alias (정적 서빙). mod_proxy 는 기존 /ex/ · / 프록시용으로 이미 로드됨.
#
# ⚠️ 순서 주의 — 이 블록은 catch-all 프록시(ProxyPass / http://127.0.0.1:3001/) 보다 *위*에 와야 한다.
#    (/ex/ 블록과 같은 이유: 아래의 "/" 프록시가 /sheet/ 를 먼저 삼키면 정적 서빙이 안 됨)
#    권장 순서:  [/ex/ 블록]  →  [이 /sheet/ 블록]  →  [catch-all "/" 프록시]

# /sheet (슬래시 없음) → /sheet/ 로 정규화
RedirectMatch ^/sheet$ /sheet/

# /sheet/ 는 프록시 대상에서 제외하고 로컬 정적 파일로 서빙
ProxyPass /sheet !
Alias /sheet /opt/formflow-sheet
<Directory /opt/formflow-sheet>
  Require all granted
  Options -Indexes
  DirectoryIndex index.html
</Directory>
