<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"></head>
<body style="font-family:'Apple SD Gothic Neo',Pretendard,sans-serif;color:#222;">
  <div style="max-width:560px;margin:40px auto;padding:32px;border:1px solid #eee;border-radius:12px;">
    <h1 style="margin:0 0 16px;font-size:24px;">폼 강제 마감 안내</h1>
    <p>{{nickname}}님, 안녕하세요.</p>
    <p>회원님의 폼 <strong>{{formTitle}}</strong> 이(가) 관리자에 의해 마감 처리되었습니다.</p>
    <p style="margin:24px 0;padding:16px;background:#fef2f2;border-radius:8px;color:#991b1b;">
      사유: {{reason}}
    </p>
    <p>마감된 폼은 더 이상 응답을 받을 수 없습니다. 이의가 있으시면 아래 메일로 문의해 주세요.</p>
    <hr style="border:none;border-top:1px solid #eee;margin:32px 0;">
    <p style="font-size:12px;color:#999;">본 메일은 발신 전용입니다. 문의는 support@sosyge.net 으로 보내주세요.</p>
  </div>

</html>
